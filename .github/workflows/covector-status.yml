name: covector status
on: [pull_request]

permissions:
  contents: read

jobs:
  covector:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # required for use of git history
          persist-credentials: false
      - name: covector status
        uses: jbolda/covector/packages/action@covector-v0
        id: covector
        with:
          command: "status"
